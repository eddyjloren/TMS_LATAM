version: "3.8"

# Levanta una base de datos PostgreSQL local para desarrollo.
# Uso: docker compose up -d
# Luego en .env: DATABASE_URL="postgresql://tms:tms@localhost:5432/tms_db?schema=public"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tms
      POSTGRES_PASSWORD: tms
      POSTGRES_DB: tms_db
    ports:
      - "5432:5432"
    volumes:
      - tms_pgdata:/var/lib/postgresql/data

volumes:
  tms_pgdata:
